name: ci

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Verify modules
        run: go mod verify

      - name: Format check
        run: make fmt-check

      - name: Vet and test (no f4kvs)
        run: make vet test-lite

      - uses: golangci/golangci-lint-action@v6
        with:
          version: v2.12.2

      - name: Build client
        run: go build -o /dev/null ./client

  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/checkout@v4
        with:
          repository: noematic-eu/f4kvs-ffi
          path: f4kvs-ffi

      - name: Build and test
        env:
          F4KVS_ROOT: ${{ github.workspace }}/f4kvs-ffi
        run: make f4kvs tantivy build test

      - name: Build agent binary
        env:
          F4KVS_ROOT: ${{ github.workspace }}/f4kvs-ffi
        run: make agent
