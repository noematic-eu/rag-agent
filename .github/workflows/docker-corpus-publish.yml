name: docker-corpus-publish

on:
  release:
    types: [published]

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/rag-agent
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - corpus_name: eval-public
            corpus_src: eval/fixtures/docs
            corpus_tag: eval-public
          - corpus_name: legal-demo
            corpus_src: texts
            corpus_tag: legal-demo
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Clone f4kvs-ffi
        run: git -c credential.helper= clone --depth 1 https://github.com/noematic-eu/f4kvs-ffi.git f4kvs-ffi

      - name: Clone f4kvs-lexical
        run: git -c credential.helper= clone --depth 1 https://github.com/noematic-eu/f4kvs-lexical.git f4kvs-lexical

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=corpus-${{ matrix.corpus_name }}
            type=raw,value=corpus-${{ matrix.corpus_name }}-{{tag}}

      - name: Build and push corpus image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile.corpus
          target: corpus-runtime
          build-contexts: |
            f4kvs=./f4kvs-ffi
            f4kvs-lexical=./f4kvs-lexical
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            CORPUS_NAME=${{ matrix.corpus_name }}
            CORPUS_SRC=${{ matrix.corpus_src }}
            CORPUS_TAG=${{ matrix.corpus_tag }}
            BAKE_MODE=ingest
            DISABLE_EMBEDDINGS=true
          cache-from: type=gha,scope=corpus-${{ matrix.corpus_name }}
          cache-to: type=gha,mode=max,scope=corpus-${{ matrix.corpus_name }}
