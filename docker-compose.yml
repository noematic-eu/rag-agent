services:
  # Option A (default): use your already-running local Ollama on the host.
  # The ollama service below is commented out to avoid port 11434 conflicts.
  # Uncomment it (and the ollama-data volume) if you want a fully self-contained stack.

  # ollama:
  #   image: ollama/ollama:latest
  #   container_name: rag-agent-ollama
  #   ports:
  #     - "11434:11434"
  #   volumes:
  #     - ollama-data:/root/.ollama
  #   healthcheck:
  #     test: ["CMD", "ollama", "list"]
  #     interval: 30s
  #     timeout: 10s
  #     retries: 10

  rag-agent:
    build:
      context: .
      dockerfile: Dockerfile
      additional_contexts:
        f4kvs: ${F4KVS_ROOT:?Set F4KVS_ROOT in .env to your local f4kvs-v2 checkout}
    container_name: rag-agent
    # depends_on:            # uncomment when ollama service is enabled above
    #   ollama:
    #     condition: service_healthy
    environment:
      RAG_LISTEN: ":8080"
      RAG_DATA_DIR: "/data"
      RAG_LLM_PROVIDER: "ollama"
      # host.docker.internal resolves to the Mac host from inside Docker
      RAG_LLM_BASE_URL: "http://host.docker.internal:11434"
      RAG_LLM_MODEL: "qwen2.5:7b-instruct"
      RAG_EMBEDDING_MODEL: "nomic-embed-text"
      RAG_LEXICAL_ENGINE: "bleve"
      # Required for the live demo on localhost:4321 (Astro dev / site preview).
      RAG_CORS_ORIGINS: "${RAG_CORS_ORIGINS:-http://localhost:4321,http://127.0.0.1:4321}"
    # Host 8081 avoids clashing with a native ./bin/agent on 127.0.0.1:8080 (no CORS).
    ports:
      - "8081:8080"
    volumes:
      - rag-data:/data
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  rag-data:
  # ollama-data:   # uncomment when ollama service is enabled above
